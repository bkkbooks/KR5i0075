  - {type: variant, offset: 0, length: 437, content: 心傳述證錄心傳述證錄序道本同源止此一是三教之功修無異心卽無異傳要皆性命之學也自伏羲畫卦道啟于易象之先文王周公孔子遞相演述與危微精一之旨相發明葢本此心傳也魯論曰一貫大學曰明德中庸曰率性同此一道同此心傳大抵總由人身之太極以求無聲無臭之眞宰馴至天地位萬物育學之所在卽道之所在也豈僅以民物規則禮樂政刑爲吾儒所當務而置性命之學於不問哉夫大而倫常綱紀小而名物象數原皆道之萬殊而非道之一本此聖賢仙佛之所以的的有心傳也兹編得之吾鄕前輩家藏葢以無極道祖所垂諸說爲聖學心傳而以沂陽劉子之說附而述證之將三教同源之旨性命𤣥微之功簡易明白顯爲指出義藴精大非尋常訓詁考據之學可比洵爲庸腐曲俗者千古昏衢之炬燭也予年二十𡻕時卽獲是編寶而讀之愈研求愈覺妙義之無窮焉子今年七十有五葢巳忽忽又五十有五年矣爰重鐫而公之世俾有志於道者得覩是書加以身體力行切實功修其庶幾豁然頓披雲霧朗見晴天始信三教原有至詣證述亦爲糟粕宇宙間本同一大靑空光明藏耳尙何言哉尙何言哉雎陽梅芳老人謹誌於守經堂西軒時嘉慶八年𡻕在癸亥上元日也重刋, YP-C: ''}
