body:
  text: 無極之真非有非空萬象備具有理無形無無不有虛而能盈三教之祖體用未呈無內無外通幽通明何思何慮希臭希聲寂然不動表裏鞏靈範圍天地道不虛行沂陽子曰無極者靜也虛也性也命也至誠無息大道元貞一圈朕兆吾無能名昔賢傳述無極子孚佑帝君云先天混混沌沌陰陽未分氣與理附乃無極也人以一心而參至妙至玄之理以一身而備三才萬化之機道法雙修體用不悖夫大道生虛空虛空運大道大道乃虛空之父母虛空乃天地之父母虛空無際故能生天地空中不空故能生虛空空中不空乃真空真空乃大道之根此言無極真宰也至哉言乎是編盡闡儒道同源真諦故後多引述印證焉後之學者幸勿歧視三教乃於聖賢路徑有入門處也混極圖無極子曰混極者虛中之象也苞象數于淸濁未分之內具形器于圖書將判之先其氣機畢具者言兩儀四象八卦之理暗然藏伏所謂體不雜乎陰陽之太極也形器已呈者言雖有儀象卦畫之分而其所以然之理初無聲臭之可求所謂用亦不離乎陰陽之太極也元極圖無極子曰元極者本元始之凝合藏太和之絪緼粹至精而無色含一氣而無形正有物渾成先天地生之謂也居混沌之先淸濁一致具陰陽之體變化有機包三極而立混極之元還終天而為始天之化兹非太極之氣母乎是以知無終盡之機者易也有相生之本者乃元極之神也性超無極而獨立者乃能見之靈極圖無極子曰靈極者藏妙有于虛靈之內體真無于有極之先不別而自分不鑿而自竇將以啓造化之初機發靈光之始竅經云常無欲以觀其妙常有欲以觀其竅正此時之探取也道虛則大心虛則靈故靈極為天地之始竅即為萬物之化源也太極圖無極子曰太極者靈極之漸闢而漸虛者也洞然不雜于陰陽朗然不虧於元體存變化于無定極之中而陰陽自有至定極之理所以上之一即陽之竒也下之二即陰之偶也其中以竒偶之畫合而跂之即人也人之用出于陽之上而包于陰之外故能參天兩地而成位乎其中也不言元極則太極同于一物而不足為萬化之本根不言太極則元極淪于空寂而不能為萬物之資始是以動靜無端陰陽無始正太極之妙用也沂陽子曰太極者本於太初三教一元也其名有三其理則一故儒曰太極道曰金丹釋曰圓覺所謂無極而太極者不可極而極之謂也在人始生之初一點靈光而所以主張乎形骸者太極也父母未生以前一片太虛而所以不離乎形骸者無極也然自運行而言則曰時候雖天地不外乎一息自凝結而言則曰真種雖一息可包乎天地若動物太極在宿蟄孕字植物太極在歸根結實人身太極在晏息𥥆冥交姤結胎至人修道能按時交姤有法豈止長年而已哉嘗取雞卵喻清包黃地處天中象陰陽也中一點名曰絨無極之真也卵非殼範圍清黃漓之太極非無極範圍陰陽息矣淸黃莫辨䝉殼無方得非黃中之一真乎況有象之先恍恍惚惚未形之後杳杳冥冥學者審諸中極圖無極子曰中極者即靈極本來之真體太極初分之始機向之凝者漸融形者漸運陽動而上動中有陰陰靜而下靜中有陽靜極則為動之體動極即為靜之用交相體用運行不息靜則陰之體立而陰以分動則陽之用行而陽以分但陰陽當以上下分不當以左右列動靜當以生中含化不當以極後推復也故太極本自嶷然乘氣機而端變化本于剛柔相生之至理非有顚倒造化之能轉移乾坤之力者不能知其所以然之妙也少極圖無極子曰少極者一竒立于其中二偶分于左右陽氣屈曲于其下積氣尚微生機尚伏故謂之少也但陽既動而輕淸者上浮陰既靜而重濁者下沉則天氣升而生化地氣降而化生由是一元真氣充塞兩間生生不窮化源具備已如陽始生為水水尚柔弱必至生木而氣始强盛陰始生為火火尚微渺必至煉金而力始堅固故水為陽之稚木為陽之盛火為陰之稚金為陰之盛也老陽老陰不能復生必得少陽少陰而後能成生育之功少極繼生生于太極之後者豈非為三才之朕乎太陽圖無極子曰太陽者日也以太極之全體一畫橫亘于其中精實而不虧故日為太陽之象也但日雖陽精質本乎陰燠萬物而化光者必資于月質之合始陽得蔽而不泄是以日之體本陰陰之精藏乎陽也得其體則萬古不變相兼以成者即相待以久之理也此日之所以交于月而成易也太陰圖無極子曰太陰者月也以太極之分形二畫並列于其中精虛而不盈故月為太陰之象也但月雖陰精質本乎陽麗萬物而有常者必借于日光之合始陰有主而不散是以月之體本陽陽之精藏于陰也得其用則盈虛有度相尅于隱顯者即相制于上下之理也此月之所以承于日而成易也象明圖無極子曰象明者因日月之象而合之以成明因日月合明而體之以成易故懸象著明莫大乎日月日月之道貞明者也貞明者易之義也蓋日東月西則為明日上月下則為易陰陽變化特一旋轉運用之間耳故易之體用不膠于離南坎北之方位不暌于先天後天之推移隱顯融通一名而含三義其易之謂乎以交代而名則曰易所謂生生不窮是也以常體而名則曰不易所謂定位不移是也以改革而名則曰變易所謂變則必通是也易者其德也不易者其位也變易者其氣也以往來環轉之機律上下一中之理豈非日月相推而明生焉之謂乎三才圖無極子曰三才者以偶之二疊于竒一之上數象合三乃天地人之全體也天開于子地闢于丑人生于寅以人而具二氣之精立兩儀之極而首出乎其中矣以藐然之身而乃與天地並立為三至其為道又與天地混然而無間其可不知所以自立之義哉蓋盈天地之間者惟萬物而人居萬物之一物之感人人之應物無時不然及其擴充運用正三綱明五教序萬事窮理盡性以至于命致中和贊化育參天地而相與于無窮者人又與太極同其功用也故易之為書也廣大悉備有天道焉有人道焉有地道焉立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義也是以三才之統還于太極之一也易有太極沂陽子曰一者生物之始氣之本根也六者成物之始形之本體也故一六合而造化生其中間一白乃修仙入聖之真宰周圓六黑即六通無礙之源頭左二十四白以應四時二十四氣念四個九共成二百一十六數乾之策也右二十四黑以應四維二十四位念四個六共成一百四十四數坤之策也太虛未始有數陰陽分而為半半而進之為五五位相得而各有合河圖五十有五備天地之數矣貞下起元用九還一洛書以分九宫列八卦其數四十有五變而合之洞微百六以範生民大衍斟酌圖書而用其中重五相錯十策九疇外衍四十七七以由坤言曰地道無成大終之貞不及十素經云土常以生太宫之化乃用五大衍蓋取諸此裒河圖五十五之五益洛書四十五之五凡百成而居半仍虛一以為用者原夫半之環於虛而生生之謂易也夫太極惟一氣耳一氣既分輕淸者上為天重濁者下為地太極生兩儀也兩儀既分則金木水火四方之位列兩儀生四象也水數六居坎而生乾金數九居兌而生坤火數七居離而生巽木數八居震而生艮四象生八卦也兩儀沂陽子曰繫辭曰易有太極是生兩儀故河圖以一三五七九聚為陽儀二四六八十積為陰儀善言易者莫如孔子大傳云一陰一陽之謂道道太極也一陰一陽兩儀也道非一陰一陽不可見太極非兩儀不可圖一陰一陽即道非陰陽之外別有道兩儀即太極非兩儀之外別有太極但道不可見而陰陽可見聖人直指陰陽謂之道太極不可象而兩儀可象老子曰此兩者同出而易名也紫陽詩云潛心雖出重爻後著眼何妨未畫前識得兩儀根太極此時方好絶韋編四象五行沂陽子曰啓䝉云兩儀生四象兩儀之上各生一竒一耦而為二畫四象之中太陽還天太陰還地少陽者天之陽下交於地之陰中其陽少而陰多故曰少陽其象為水少陰者地之陰上交于天之陽中其陰少而陽多故曰少陰其象為火雖有四象之異實本太極之元一分為二者又重分之為四爾其位則太陽一少陰二少陽三太陰四其數則太陽九少陰八少陽七太陰六以河圖言之則六者一而得五七者二而得五八者三而得五九者四而得五以洛書言之則九者十分一之餘八者十分二之餘七者十分三之餘六者十分四之餘周子所謂水火木金邵子所謂二分為四者皆謂此也八卦六虛乾三連坤六斷震仰盂艮覆碗離中虛坎中滿兌上缺巽下短無極子曰乾坤為父母而坎離代其位震巽用其權艮兌終其事故坎離者乾坤之用而六子之體也坎卦陽裏而陰表離卦陰裏而陽表陰陽之交即性命之蒂也六虛之動坎離之運用也萬化之流性命之根源也是故八卦者天體之自然也即心體之自然也聖人則而象之理而分之本無矯强之智也沂陽子曰繫辭曰易之為書不可遠為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適參同契云二用無爻位周流行六虛往來既不定上下亦無常幽潛淪匿變化於中包囊萬物為道紀綱以無制有器用者空故推消息坎離沒亡言不苟造論不虛生引驗見效校度神明推類結字原理為證坎戊月精離巳日光日月為易剛柔相當土旺四季羅絡始終靑赤白黑各居一方皆禀中宫戊已之功伏羲擬山定卦天地定位山澤通氣風雷相薄水火不相射八卦相錯數往者順知來者逆乾坤縱而六子橫相為對待以立本沂陽子曰伏羲仰觀天文以畫八卦故日月星辰之行度運數十日四時之屬凡麗於天者八卦無不統之其父天母地乾上坤下六子旁列以河圖相生又以卦位相尅生尅備而天下治故男居西北陰方宜從母陰闢三陽見坤翕矣女居東南陽位宜從父陽直三陰見乾專矣獨東方震離相生者龍從火裏出乃先天之妙機也乾居南而坤居北謂乾首坤腹之象日出卯為離火受生於木是居東月始庚為坎水受生於金是居西亦自然之道耳文王八卦易位長子用事長女代母坎離得位巽艮為耦震兑橫而六卦縱迭為流行而致用沂陽子曰文王凖帝出乎震因時易位有補天受命之功天既曰補地道宜順故後天以巽木易兑澤使其水木相生民始安順巽者順也而為風木迎風順乃生後天離火以歸西南之坤歸根復命之理也後天之坤即先天之巽先天之坤即後天之坎也易曰西南得朋乃與類行文王移艮山於東北以伏震足此蘆灰止水鰲足安山之義堤防汪洋用培方長之木艮以止之時止時行之妙化誠道統之原也太古龍馬負圖以示象伏羲則易之以畫卦河圖以圈之黑白分陰陽伏羲以畫之竒耦分陰陽其畫三以象天地人其一陰一陽錯雜變易普周八方配合而成八卦當未有天地之前一氣未生極難名狀即老子僅謂之無名無名之久一氣始生老子則謂之有名矣此氣乃先天真陰後天元陽也逮一氣輕淸上浮成天天純陽故畫以三竒為三連命之曰乾重濁下凝成地地則純陰故畫以六耦為六斷命之曰坤此陰陽之正也當其時一氣初分止有乾坤兩卦且未變為坎離又安有震兑諸卦耶兩儀既闢亦自後天特乾坤卦在諸卦之先故曰先天丙丁方陽位也河圖當用白九今止用七者以陰陽既分則必交感陰陽一交則陽失其一於壬癸方矣九去其一止餘八數八陰數也陰則耦故下有黑二八去其一止餘七數故其上止用七白此乾變離之象也陽中有陰伏羲則之畫以中虛而命之曰離離者真陽離也壬癸方得一點陽精陰中有陽焉六黑之中一白坤成坎之象也伏羲則之畫以中滿命之曰坎坎止也謂真陽止於此此陰陽之變也坎離既當南北正中則乾自歸老陽位坤自歸老陰位矣離與坎交乾道成男則生長男長男居甲乙方於時屬春三陽用事故河圖用白三又黑八者其陰體尚純而未喪也伏羲則之畫以仰盂而命之曰震坎與離交坤道成女則生長女長女居庚辛方於時屬秋真陽盛滿故河圖用白九又黑圈四者少陰之體所以具此真陽者也伏羲則之畫以上缺命之曰兑乃少陽少陰也此後震與兑交其震兑未交之先尚為震兑一交之後則震兑既成坎離所生男女又為震兑坎離震兑生生不窮即生生不窮不過坎離震兑陰陽之降至此止矣然乾坤既降為震兑則必有所復於乾坤者艮巽兩卦乃復之方術也蓋後天陰陽之復當以震兑作主何也震中真陰一毫不曾喪失兑中真陽一毫不曾飛越純之又純也比交時震當止其心於至靜一毫不動是畫以覆碗而命之曰艮真心不動方可以氣制之立就鵲橋輕輕緩緩鼓動中氣以運真陽因夫輕緩運氣是畫以下短而命之曰巽惟艮巽并用則兑中真陽鵲橋兩度復於震矣震之真陰得兑中真陽點化而為先天純陽此震兑之取坎填離也然後震復成乾而兑復成坤矣艮巽之義河圖亦不載以圖能具跡象而不能具作用也伏羲自乾降離自坤降坎業已自後天推論故離南坎北震東兑西八卦錯落於八方各定方位然文王所定之卦即伏羲所畫之卦特伏羲啓其畫文王衍其文耳不可以先後天分也此陰陽之降復八卦之精藴八卦乃大道源頭伏羲乃道統創始可與陰符并解之六十四卦方圓圖無極子曰伏羲之圖所謂八卦方位也外此而橫圖也圓圖也方圖也則皆邵子之圖也圖從中起其心法也三圖不同其揆一也橫圖之序始乾終坤而震巽居其中陰陽不起于乾坤而起于震巽也震巽者陰陽之初也由震巽而坎離由坎離而艮兑由艮兑而乾坤所謂圖起于中原於此也即橫圖之兩儀中分之則為圓圖即橫圖之八卦重纍之則為方圖圓圖周圍皆八也而震巽居中為之交接方圖縱橫亦皆八也而震巽居中為之聯屬故圖起于中者震巽為之也即天之根也月之窟也六十四卦之樞也在人心則寂感之交也在事物則萬化之本也此先天定位之玄機也六十四卦運行圖圓布者陰陽運行之數天之象也陽生于子中極于午中陰生于午中極于子中一消一息流而不窮沂陽子曰易之六十四卦共成三百八十四爻即修真三百八十四銖之火候也夫人之生一點妄明流愛為種納想成胎入母中宫禀氣受質氣則頓具四大漸成諸根心則頓具四藴漸成諸識十月胎完及期而育地覆天翻人驚胞破如行山巔蹶仆頭懸足撑㘞地一聲天命真元著於祖竅晝居二目藏於泥丸夜潛兩腎蓄於丹鼎乳以養其五臟氣則冲乎六腑骨軟如綿肉滑如飴精之至也視而不瞬哮而不嗄和之至也此乃赤子混沌純靜無知屬純陰坤卦一嵗至三嵗長元氣六十四銖一陽生為復卦至五嵗長元氣六十四銖二陽生為臨卦至八嵗長元氣六十四銖三陽生為泰卦至十嵗長元氣六十四銖四陽生為大壯至十三嵗長元氣六十四銖五陽生為夬卦至十六嵗長元氣六十四銖為純陽乾卦盜天地三百六十銖之正氣原有父母二十四銖之祖氣共三百八十四銖以全周天之造化而為一斤之數此時純陽既備微陰未萌若得真傳修煉性命立可成功自此以後欲情一動元氣即虧不知禁忌貪戀無巳由十六至二十四嵗耗元氣六十四銖應姤卦一陰初生品物咸章淳澆朴散去本猶未遠而履霜之戒已見於初爻果勤修煉可謂不遠復者也至三十二嵗耗元氣六十四銖應遁卦二陰浸長陽德漸消欲慮蜂起真元流蕩然血氣方剛志力果敢能勤修煉則建立丹基亦易為力至四十嵗耗元氣六十四銖應否卦天地不交二氣各復其所陰用事於內陽失位于外真勤修煉危可安亡可保至四十八嵗又耗元氣六十四銖應觀卦陽德漸微陰氣巳盛須勤修煉可抑方長之陰扶向微之陽至五十六嵗又耗元氣六十四銖應剝卦五陰並升一陽將去必勤修煉如續火于將窮布雨于欲稿至六十四嵗卦氣巳周所得天地父母之元氣三百八十四銖耗散已盡復返于坤純陰用事極勤修煉採藥栽接則陰極而能生陽窮上而能返下革柔為剛還老為强此時不遇真師口訣汲汲修煉雖保餘年皆藉穀精以培後天之精氣無復有先天之元氣矣世人莫知生從何來盍參父母未生前死從何來知來然後知生處世人莫問死從何去盍參魂遊魄降後生從何去知去然後知死處死機由于生生機原于死有生死者身也無生死者心也人人具有本來靈明但昏迷不覺惟永離妄想方得長生久視乾坤闔闢圖無極子曰易曰闢戶謂之乾闔戶謂之坤一闔一闢謂之變往來不窮謂之通是以陰陽闔闢之法象不獨取諸卦畫而取諸乾坤也以乾坤為大父母自一陽生于子傳至已而六陽氣足則長養之用已極卦為一陰生而繼之以姤自一陰生于午傳至亥而六陰氣盈則肅殺之機巳極卦為一陽生而繼之以復陰極生陽時之至子一陽來復乃以柔遇剛也丑二陽為臨寅三陽為泰至正月而乾道小成矣蓋言泰卦之下體成乾也卯四陽為大壯辰五陽為夬至已而六陽巳極乾體大成純陽太過不可用事當此時萬物皆動故乾之六陽為闢陽極生陰時之至午一陰生而為姤此以剛遇柔也未二陰為遁申三陰為否至七月而坤道小成矣蓋言否卦之下體成坤也酉四陰為觀戌五陰為剝至亥而六陰已極坤體大成純陰不及不能用事當此時萬物皆靜故坤之六陰為闔然陰極生陽陽極生陰自子至巳乾爻主之自午至亥坤爻主之乾坤定位乎其中陰陽化形于其外互相消息環運不窮是以一陽息則一陰消一陰進則一陽退也往來變通之妙不於此而可見哉六十四卦剛柔相摩圖無極子曰觀八卦相生圖陰陽迭運剛柔相摩乃太極中變化之本根也正指二氣之相成也蓋天體至圓運行不息其行日夜一周繞地左旋兩極不動北高南下陰陽交感陽自東升陰自西降南隨陽氣上升而牽于左北隨陰氣下降而牽于右自外動而觀乎變理雖繁可以執一御也由內靜而返之極義雖博可以一名舉也得其自然之主不宰之宰則六十四卦原無卦也三百八十四爻原有爻也是故卦畫有先後而理氣無後先陰陽為動靜動靜即陰陽以至神者而象之至妙者而物之可方可圓變動不居易之形象明矣而天道自然之運亦明矣六十四卦節氣圖無極子曰易之數由逆而成逆知四時之謂也蓋太陽未交以前乾未生也自其上生一竒則為乾而兑猶未生也然其生之勢不容已不必太陽上生一偶方知其為兑即乾而逆推兑于未生之前已知其必為兑矣少陰未交以前離猶未生也自其上生一竒則為離而震猶未生也然其生之勢亦不容已不必少陰上生一偶方知其為震即離而逆推震于未生之前巳知其必為震矣自巽五至坤八其所推者亦然如是春而推夏知春之後必為夏自夏而推秋知夏之後必為秋自秋而推冬知秋之後必為冬以氣相接以神交換所謂逆知四時之謂者此也以節候合卦氣而言之復為冬至子之半頤屯益為小寒丑之初旡妄臨家人為大寒丑之半震革為立春寅之初賁既濟隨為雨水寅之半豐明夷噬嗑為驚蟄卯之初泰同人為春分卯之半損節中孚為淸明辰之初歸妹履兑為穀雨辰之半離暌為立夏已之初大畜需小畜為小滿已之半大壯大有夬為芒種午之初至乾之末交夏至午之半焉此三十二卦皆進而得夫震離兑乾巳生之卦也姤為夏至午之半大過鼎恆為小暑未之初升井蠱為大暑未之半巽訟為立秋申之初困未濟解為處暑申之中渙䝉師為白露酉之初遁否為秋分酉之中咸旅小過為寒露戌之初漸蹇艮為霜降戌之半謙坎為立冬亥之初萃晉豫為小雪亥之半觀比剝為大雪子之初至坤之末交冬至子之半焉此三十二卦皆進而得夫巽坎艮坤未生之卦也二分二至四立總為八節每節各計兩卦以震之一陽初生同革卦為立春之值候以巽之一陰初生同訟卦為立秋之值候以離之一陰中伏同暌卦為立夏之值候以坎之一陽內伏同謙卦為立冬之值候以三陽三陰上下平分陽在下者為春分之值候陰在下為秋分之值候以一陽生于五陰之下為冬至之值候以一陰生于五陽之下為夏至之值候紀分四序氣合八卦左行合于先天已生之陽數右轉合于後天未生之陰數大易之祕見于斯矣陰陽消息圖解無極子曰天地陰陽之大體也日月陰陽之精華也天地之陰陽何寓見于日月之升沉往來日月之交會盈虛驗于陰陽之消息藏伏然太陽之光明有常太陰之虧盈不一故以太陰之見象驗卦氣之消息也如月晦無光坤之象也陰之極也陰極生陽于是初三月朏一陽下生震之象矣而坤體消焉是以震來消坤而震卦巳立八日上弦二陽下生兑之象矣而震體消焉是以兑來消震而兑卦巳立望則月體圓全三陽盈滿乾之象矣而兑體消焉是以乾來消兑而乾象已立然陰未盡則陽亦未極陰盡而陽極矣極則必變變則陰生陽而陽生陰矣如望之三陽盈滿乾之象矣陽之極也陽極生陰于是十八日一陰下生巽之象矣而乾體消焉是以巽來消乾而巽卦巳成草三日下弦二陰下生艮之象矣而巽體消焉是以艮來消巽而艮卦已成晦則月盡無光三陰盈滿坤之象矣而艮體消焉是以坤來消艮而坤卦巳成陽往則陰來陰往則陽來毫無勉强故名曰消消者剝也以下滅上之義也息者長也以上得下之義也陽退則陰進陰往則陽來是以陽漸消而陰漸長陰漸消而陽漸長也然陽未盡則陰亦未極陰未盡則陽亦未極陰盡而陽極矣陽盡而陰極矣極則必變變則通是以升降進退往來不窮也受生則為進氣戀生則為泄氣進氣則長泄氣則落落之極即長之端消之極即息之機也故消之所以待謝即息之所以待長歟息長消剝升降之機也盛衰代謝進退之舍也易曰君子道長即小人道消小人道長即君子道消豈非陰陽消息之機乎觀諸夬剝二卦可見矣自坤卦一陽上升而變成夬自乾一陽下降而變成剝一以消而落一以息而長消其以下侵上乎息其以上生下乎返本推原生長不息可以驗陰陽老少變化之端倪矣然六卦有象可憑而坎離則無象可比故云藏伏藏伏非無象也實以見陰陽正位乎中內以合外外以合內消中含息息裏藏消消息之妙用無窮正化育之功能無盡也矣消象坤本陰體一陽方長震卦成而坤卦消震本一陽二陽漸長兑卦成而震卦消兑本少陰三陽盈滿乾卦成而兑卦消乾本陽體一陰方長巽卦成而乾卦消巽本一陰二陰漸長艮卦成而巽卦消艮本少陽三陰盈滿坤卦成而艮卦消息機震本一陽陰極生陽卦自坤來兑本少陰二陽漸長卦自震來乾體純陽陰氣盡矣卦自兑來巽本一陰陽極生陰卦自乾來艮本少陽二陰漸長卦自巽來坤體純陰陽氣盡矣卦自艮來精一執中沂陽子曰唐虞相傳人心惟危道心惟微惟精惟一允執厥中誠為萬世心學之宗然聖聖相承人皆莫悟如知此中當以人身天地之中處求之中心合易即無極之自然觀其人心惟危自復以至乾是見其惟精惟一自姤以至坤是允執厥中即道心之微以復其無極之真也蓋熙皡宇宙者少陽也有則無方一動而中虛無極之範圍也太極信無極之本流生水火復見天心一中丨分合之道也乾坤咸二極之心互四卦之母禀命應元時中化育之功健矣夫中之象也左外內虛白屬陽中陰體有形且質少陰變太陽其象為一一乾來自先天之離右上下皆缺屬陰中陽氣交錯過剛少陽變太陰其象為坤來自先天之坎先天渾成太極之陽氣自南而東而北禀命西方陰氣象中字左先天之離化洽中分太極之離訂離象之真火陽明然後歸中後天之乾太極之陰氣自北而西而南禀命東方陽氣象中字右先天之坎化洽中分太極之坎見坎象之真水陰靈然後復中後天之坤一中之道既晰二極之圖斯凖古云取坎中陽去補離依舊乾坤造化基邵子曰天向一中分造化人從心上起經綸則知先天之一本後天之中耳聖學法天沂陽子曰人身各具一太極吾即太極之異名大衍之數五十有五十有五乃河圖中大一至也此天地生成之數夫子教人立志學此天一生水北方七五合為三十五數內除一五復還其中故曰三十而立是腳下已踏著了要守得此定地二生火南方九五合為四十五數內除一五復還其中故曰四十而不惑是隨事見理明徹無礙天三生木東方十一五合為五十五數內除一五歸中故曰五十而知天命是一陽來復知他本源地四生金西方十三五合為六十五數內除一五歸中故曰六十而耳順是金來歸性融會純熟中央十五五合為七十五數內除一五復還太極故曰七十而從心所欲不踰矩聖人心體之妙一動即有潔矩心者中也縱橫闔闢無不允合渾然天命之初而吾志始無歉是不期其然而然亦然而不知其為然矩即天也即吾心也不言無欲而言所欲蓋聖心之所欲即天則也大學則易沂陽子曰聖人見圖畫卦而有天地之象是易為大學不曰天地之道而曰大學之道卦有日月之儀合而為明不曰日月而曰明位列三才故以明德親民至善為三綱遞生五行故以定靜安慮得為五事變成八卦故以格致誠正修齊治平為八目然大學之道有個大本體明德是也有個大作用新民是也有個大歸結止至善是也有個大根宗修身是也有個大次第本末先後是也有個大肯綮致知格物是也然通章只是個明明德新民明德中事止至善滿此明德之量知止知此明德能得得此明德齊治平明明德於家國天下也格致誠正修明明德於已也精言之為明明德約言之為修身故曰一是皆以修身為本而修身之下手處則在格物致知所以首說明明德而歸宿於止至善後說明明德於天下而權輿於修身則知真修只在知止止則通體無欲至善於此歸藏矣蓋吾身原具有乾坤乾之性情在於坤坤之性情在於乾此坎離之所以交而地天之所以泰也夫水潤下火炎上亦其性情然也若不得乾坤之性情以復其初則水自水而火自火不升不降矣故太和元氣皆由此中出中心之心既實則五行之心自虛此乃直指人心虛靈不昧之竅廓然無際神妙莫測渾然大中不偏不倚正不覩不聞之妙知此則近道矣中庸參贊沂陽子曰吾儒讀中庸均知子思子憂道學失其傳而作中庸首以天命率性修道三者為教人尚難悟幸朱子集注發明其詳曰天以陰陽五行化生萬物只此一句泄盡太極圖五個圈子天字是上第一圈陰陽言第二圈五行言第三圈乾道坤道言第四圈化生萬物言第五圈孔子所謂易有太極乃法伏羲六十四卦次序以為道統一涵無極中洽太極原無從分有則兩儀四象八卦甲子天地君臣夫婦父子山川民物諸凡造化俱從一中禀命而來一中二字便是此人丨靜正之初生旨未䝉直象陽點象陰陽天陰地地處天中純陽剛直冲上根下故太極之陰陽不二是丨剛柔隱微亦不離此丨靜極陰動承口陽合中中既含于太極之舍旨隨發于無極之圈喜怒哀樂未發之元謂之中發而皆中節之利謂之和是故伏羲之先天未嘗無坎離文王後天之學未始無乾坤顧時宜之損益動靜之覺先後耳君子中庸本太極之中包陰羅陽陽者仁陰者智仁智顯而為大中至正者用偏見則陰陽失候日月失明上下失序故聖人通易教民當名辨物不失中和之旨化育總歸于時永垂厥德是曰君子而時中引而伸之五行四餘二十八宿風雷鬼神生死治亂吉凶顯密立本趨時神而明之存乎其人鬼神造化沂陽子曰中庸所謂鬼神之為德即易云知鬼神之情狀也鬼者陰之靈神者陽之靈由此觀之鬼為至陰神為至陽夫復何疑以一氣言真陽上升至而伸者為神乃圖中復卦一陽至乾六陽是也真陰下降反而歸者為鬼圖中姤卦一陰至坤六陰是也程子言天地之功用如此鬼神者造化陰陽之氣誠者即造化陰陽之理有是理則有是氣其氣之靈而能默運至無而至有至虛而至實言鬼神即是言道吾道一以貫之復卦初爻一陽動處謂之天心貫者神也由一至六此盡已之謂忠一陰為姤從一至六貫者為鬼此推巳之謂恕忠恕兩盡一貫無餘然天地至誠無息而萬物各得其所以貫之吾借鬼神以明道鬼神是陰陽活動處盈天地皆氣則皆鬼神氣中有鬼神氣之伸屈往來誠鬼神之為德也視之而弗見者至陰也聽之而弗聞者至陽也體物而不遺者一切卦爻是造化迹也修真火候亦準於此參同契曰朔旦為復臨爐施條仰以成泰漸厯大壯夬陰以退乾健盛明此上半月進火之候也陽極陰生陰生於午姤始紀緒遁世去位否塞不通觀其權量剝爛肢體歸乎坤元此下半月退符之候也而玄幽綿眇隔閡相連二句妙旨學者宜究閡字從門從亥即知亥在坤門坤居亥位亥之左是復陽亥之右是剝陽謂天地雖玄遠然日月交氣應其行度則又相連五行互用無往不復否泰相濟始復終坤起復止晦入符出火益水安金行火止水理若循環涵養不失時節自然千古長存道德曰谷神不死是謂玄牝玄牝之門是謂天地根陰符又云人知其神之神不知不神之所以神能動能靜是我之神默默中一點虛靈是神之神覺念不存杳杳冥冥謂之不神性靈氣固心死神活一片虛無謂之所以神至聖之人自然形神俱妙與道合真乾坤無所不充陰陽無所不備玄之又玄無聲無臭極矣至矣持志養氣沂陽子曰孟子此章一千九十六字始言不動心太極為心次言持志一陽初動再言氣者一切卦爻萬物皆備矣知言者知此道之流行也浩然之氣即是水火浩為泉泉之始達乃坎中一陽上升而流行於乾充塞乎天然為火火之始然乃離中一陰下降而流行於坤充塞乎地水火既濟其動靜所乘之機或玄而萌或黃而芽溟溟涬涬名曰太虛𢌿於人而為浩然至大不可限量至剛不可屈撓在天為日星在地為河嶽幽則為鬼神生則為聖賢孟氏善養所謂大人者不失其赤子之心養之之胎也求放心養之之要也夜氣養之之候也火始然泉始達養之之生意也擴而充之無為其所不為無欲其所不欲養之之實功也勿正勿忘勿助長養之之節度也工夫全在以集義為主如學道修真有文武火候此氣本無邊際更無內外不可以無心求不可以有心守只將神竅凝聚的這點元陽運而藏之闔闢處以至靜為主當其真種初生謹謹護持牢關神室不使滲漏一切時中混混沌沌如處母胎不可須臾離也養之之法節其寒溫消息耳參同契云候視加謹愼審察辨寒溫審其火之未然須藉巽風以鼓之察其火之既發須資神水以沃之太過則抑之不及則益之必得中和方無火燥火寒之失知言看須一念不起一意不散含光默默真息綿綿圓明覺照常法自然此善養之真火候也詩云既通天癸始生荄自有真陽應候回三昧火從離位發一聲雷自震中來氣神和合延靈質心息相依結聖胎透得裏頭消息子三關九竅一齊開文火居左設二十四氣於陽火武火居右搬六十四卦於陰符謹戒抽添專精運用虛無之內復闢元始祖氣而槖籥機神超凡入聖太極絪緼若或鼓乎氣之紛紜而充塞天地矣仁義禮智四端沂陽子曰孟子言不忍人之心即道之太極火之始然泉之始達道之兩儀仁義禮智道之四象惻隱羞惡辭讓是非道之八卦易曰立天之道曰仁與義仁者全體渾然義者仁之大用禮者仁之調理智者仁之鑒別性之而成聖體之而成賢㑹而通之以成身故仁者天地之大德聖學之極功人心之生理其生生不息則仁即人之本心根於性命義者人之正路以心制事由體達用身之所在義亦在焉所以仁義為人倫之綱維庶物之裁制在心為仁天理之全體也在事為義天理之大用也禮與智則循而行之不失其宜是也仁義禮智乃未發的道理惻隱羞惡辭讓是非乃巳發的端倪如冬至一陽初動所謂來復時天地之心何時不在特以復動時見耳人心一念萌動無有不善若到納交要譽惡聲便非本來初心四端擴充原只是一個天機但觸發處不同因異其名焉然隨其天機所露處念念使之圓滿是謂擴充擴而充之為震離兑乾流行以出推廣充滿為巽坎艮坤運用而入朱子云人之一心在外者要收入來是求放心也在內者又要推出去即此章意也繫辭曰闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通孟氏存心養氣準易而用極與家國天下乎何有天根月窟無極子曰易者履運處身之道也凡動而生陽靜而生陰理也動而無靜靜而無動物也靜而無靜動而無動神也靜中有動動中有靜氣也一動一靜之間往來不失其衡者即天根月窟之謂也所謂天根者指坤震二卦之間為言也坤震之間陰既極矣陰復孕陽微陽將生即天所生之根也所謂月窟者指乾巽二卦之間為言也乾巽之間陽既極矣陽將生陰微陰復生即月所出之窟也陰陽一元氣也非有二也動而陽靜而陰更相禪代無有窮已方其動而陽也非全無陰陽漸盛則陰漸微及其靜而陰也非全無陽陰漸盛則陽漸微盛之極者消則微之極者息矣知此則知坤震之間乃乾之靜專既極而動直之將萌也故曰天根乾巽之間乃坤之靜翕既極而動闢之將萌也故曰月窟蓋天包地外地下有天凡根之著愈深則萌之所發愈暢此天根之名所以立也月之魄受日之光就月之無光處正月之本體始現此月窟之名所以立也氣機闔闢流行不已而人物生焉以吾身而處乎人物之中必也下極乎動靜之間如足之足耳天根上極乎動靜之間如手之探月窟真有以見乎氣機消息之妙而後可以喻于呼吸存存之竅所謂三十六宫即指八卦之畫為言也以剛畫竒為一柔畫偶為二合陽宫之十二陰宫之二十四共成三十六宫之數也以耳目聰明之身而探月窟躡天根知物識人灼見乎震巽之出入即造化之所往來也閒心獨處無將無迎無起無滅默合流行之妙則泛而應曲而當三十六宫陽宫不暑陰宫不寒無適而非春也是故萬物化光皆根於心心之為根也心之為窟也生生不息與震俱出與巽俱入不戕其根不障其窟則滿腔皆春發育萬物是無偏倚駁雜之虞也已沂陽子曰邵子曰耳目聰明男子身鴻鈞賦豫不為貧手探月窟方知物陰足躡天根始識人陽乾遇巽時觀月窟地逢雷處見天根天根月窟間來往三十六宫都是春此詩泄盡天機火候之祕又云慌惚光陰初變化絪緼天地乍回旋中間些子好光景安得工夫入語言又云天心復處是無心心到無時無處尋若謂無心便無事水中何事郤生金先運離中之火鍊坎內之金是謂以紅扶黑則凝神入坤臍而生真復運水中之金以制火中之水是謂以黑見紅則凝神入乾首而成聖悟真所謂依他坤位生成體種在乾家交感宫惟能盡人盡物之性又為修身修道之方如此者不見而章不動而變無為而成功莫備於此也玉蟾曰因看斗柄運周天頓悟神仙妙訣一點真陽生坎位補郤離宫之缺自古乾坤這些離坎日月無休歇今年冬至梅花依舊凝雪先聖此日閉關不通來往皆為羣生設物物總含生意正在子初亥末造物無聲水中火起妙在虛危穴如今識破金烏飛入蟾窟學者再玩斯言則能知物識人矣象月火候沂陽子曰經曰赤童戲朱雀變化為靑龍坤初變成震三日月出庚東西分卯酉龍虎自相尋坤再變為兑八日月出丁上弦金半斤坤三變成乾十五三陽備圓照東方甲金水溫太陽赤髓流為汞𡛥女弄明璫月盈自合虧十六轉相减乾初闕成巽平明月現辛乾再損成艮二十三下弦下弦水半斤月出於丙南乾三損成坤坤乙三十日東北喪其明月沒于乙地坤乙月既晦土木金將化繼坤生震龍乾坤括終始火候法象盡於此矣參同又云晦朔之間合符行中混沌鴻濛牝牡相從滋液潤澤施化流通天地神明不可度量利用安身隱形而藏始於東北箕斗之鄉旋而右轉嘔輪吐明潛潭見象發散精光昴畢之上震出為徵陽氣造端初九潛龍陽以三立陰以八通三日震動八日兑行九二見龍和平有明三五德就乾體乃成九三夕愓虧折神符盛衰漸革終還其初巽繼其統固濟操持九四或躍進退道危艮主進止不得踰時二十三日典守弦期九五飛龍天位加喜六五坤承結括終始韞養衆子世為類母上九亢龍戰德於野用九翩翩為道規矩陽數已訖訖則復起推情合性轉而相與循環璇璣升降上下周流六爻難以察覩故無常位為易宗祖則一時六候二候成真乃得藥之道前行須短此有作是根基也四候別用乃自然之理後收須長此無為謂道妙也虛無生道大象無形妙道希聲虛空粉碎一貫時中道德經云道生一一生二二生三三生萬物萬物負陰而抱陽冲氣以為和人之所惡惟孤寡不穀而王公以為稱故物或損之而益或益之而損人之所教我亦教之强梁者不得其死吾將以為教父又曰有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以為天下母吾不知其名字之曰道强為之名曰大大曰逝逝曰遠遠曰反故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然詩云上天之載無聲無臭至矣
